name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          check-latest: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      - run: go test -race ./... # includes the SIGKILL crash-injection harness
      - run: make doc-check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          check-latest: true
      - run: make lint

  windows-build:
    # The crash-injection harness uses SIGKILL (POSIX only, guarded by a
    # //go:build !windows tag), so Windows is build-only: no test run.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          check-latest: true
      - run: go build ./...

  mutate:
    # rerun's dependency-free mutation tester gates the deterministic core's
    # one-expression invariants. It is fast enough to run on every PR.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          check-latest: true
      - run: go run ./tools/mutate

  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rerun
          POSTGRES_PASSWORD: rerun
          POSTGRES_DB: rerun
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rerun"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          check-latest: true
      - name: Postgres store contract
        env:
          RERUN_PG_DSN: postgres://rerun:rerun@localhost:5432/rerun?sslmode=disable
        run: go test -tags postgres -race ./postgres/
